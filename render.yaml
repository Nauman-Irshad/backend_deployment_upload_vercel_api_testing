# Repo root IS the API (main.py at top level). Do NOT set rootDir to "backend".
services:
  - type: web
    name: image-upload-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
